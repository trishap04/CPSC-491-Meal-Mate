<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donation Directory</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background:#111;
      color:white;
      text-align:center;
      padding:20px;
    }

    input {
      padding:12px;
      width:300px;
      border-radius:6px;
      border:none;
      margin-right:10px;
    }

    button {
      padding:12px;
      background:#2e7d32;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .site {
      background:#202020;
      padding:15px;
      margin:15px auto;
      max-width:800px;
      border-radius:10px;
      text-align:left;
    }

    a { color:#8fd3ff; }
  </style>
</head>

<body>

<h1>Donation Directory</h1>

<input id="addressInput" type="text" placeholder="Enter your address">
<button onclick="findClosestPlace()">Find Closest</button>

<div id="status"></div>
<div id="directory"></div>

<script src="donation-directory.js"></script>

</body>
</html>
