<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://getbootstrap.com/docs/5.3/examples/album/" />
<script src="../assets/js/color-modes.js"></script>
<link href="../assets/dist/css/bootstrap.min.css" rel="stylesheet" />
<meta name="theme-color" content="#712cf9" />
<title>Learn | MealMate</title>

<link rel="stylesheet" href="style.css">

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #212529;
  color: #333;
}


.learn-header {
  text-align: center;
  padding: 40px 20px;
  background-color: #212529;
  color: white;
}


.learn-container {
  width: 90%;
  max-width: 1200px;
  margin: 30px auto;
}


.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}


.learn-card {
  background: white;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  overflow: hidden;
  transition: transform 0.2s ease;
}

.learn-card:hover {
  transform: translateY(-5px);
}

.learn-card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.learn-card-content {
  padding: 20px;
}

.learn-card h3 {
  color: #2e7d32;
}


.learn-card a {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 14px;
  background: #2e7d32;
  color: white;
  border-radius: 6px;
  text-decoration: none;
}

.learn-card a:hover {
  background: #1b5e20;
}


.back-button {
  display: inline-block;
  margin-bottom: 20px;
  padding: 10px 16px;
  background: #2e7d32;
  color: white;
  border-radius: 6px;
  text-decoration: none;
}

.back-button:hover {
  background: #1b5e20;
}

</style>
</head>
<a href="index.html" class="btn btn-primary my-2">Back</a>
<body>


<header class="learn-header">
  <h1>Learn About Food Waste Reduction</h1>
  <p>Simple ways to reduce waste and help your community.</p>
</header>

</body>
</html>
